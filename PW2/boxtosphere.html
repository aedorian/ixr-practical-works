<html lang="en"><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0">
  <style>
    body {
      margin: 0px;
      overflow: hidden;
    }
  </style>
<style>#related { display: none !important; }
  #comments { display: none !important; }</style></head>

<body>
  <div id="container"><canvas style="display: block; touch-action: none; width: 1536px; height: 751px;" data-engine="three.js r183" width="1920" height="938"></canvas></div>

  <script id="vertexShader" type="x-shader/x-vertex">
        uniform float time;
        uniform vec2 resolution;
        varying vec2 vUv;

        #define M_PI 3.141596
        vec3 toSpherical ( vec3 src )
        {
          float r = length( src );
          float theta = atan ( length( src.xy ),src.z );
          float phi = atan ( src.y, src.x);
    
          return vec3 ( r, theta, phi );
        }

        vec3 fromSpherical ( vec3 src )
        {
          return vec3 ( src.x*sin(src.y)*cos(src.z), src.x*sin(src.y)*sin(src.z), src.x*cos(src.y));
        }

        void main()	
        {  
            vUv= uv;
            vec3 toSphere = toSpherical ( position );
            toSphere.x = mix( toSphere.x, 1.0, mod ( time, 1.0 )); 
            gl_Position = projectionMatrix * modelViewMatrix * vec4 (fromSpherical(toSphere), 1.0);
        }
    </script>

  <script id="fragmentShader" type="x-shader/x-fragment">
        uniform sampler2D tex;
        varying vec2 vUv;

        void main()	
        { 
            vec3 texColor = texture2D ( tex, vUv ).rgb;
            gl_FragColor = vec4(texColor, 1.0);
        }
    </script>

    <script async="" src="boxtosphere_files/es-module-shims.js"></script>
    <script type="importmap">
      {
        "imports": {
          "three": "https://unpkg.com/three@0.183.0/build/three.module.js",
          "three/addons/": "https://unpkg.com/three@0.183.0/examples/jsm/"
        }
      }
    </script>

  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
    
    var container;
    var camera, scene, renderer, controls;
    var uniforms, material, mesh;
    var geometry;

    var windowHalfX = window.innerWidth / 2;
    var windowHalfY = window.innerHeight / 2;
    var textureForShader;
    var textureLoader = new THREE.TextureLoader();
    var startTime;

    textureLoader.load ("grenouille.jpg", function ( texture )
    {
      textureForShader = texture; 
      init();
      startTime = Date.now();
      animate();
    });
    function init() {
      container = document.getElementById('container');
      scene = new THREE.Scene();

      uniforms = {
        time: { type: "f", value: 1.0 },
        resolution: { type: "v2", value: new THREE.Vector2() },
        tex: { type: "t", value: textureForShader }
      };

      material = new THREE.ShaderMaterial({
        uniforms: uniforms,
        vertexShader: document.getElementById('vertexShader').textContent,
        fragmentShader: document.getElementById('fragmentShader').textContent
      });

      geometry = new THREE.BoxGeometry(1, 1, 1, 10, 10, 10);
      console.log (geometry);
      mesh = new THREE.Mesh(geometry, material);
      mesh.material.side = THREE.DoubleSide;
      mesh.rotation.x = Math.PI / 2.0;
      mesh.rotation.z = Math.PI;

      scene.add(mesh);

      renderer = new THREE.WebGLRenderer();
      renderer.setPixelRatio(window.devicePixelRatio ? window.devicePixelRatio : 1);
      container.appendChild(renderer.domElement);

      camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, .1, 200);
      camera.position.set(0, 1, 2);

      controls = new OrbitControls(camera, renderer.domElement);

      uniforms.resolution.value.x = window.innerWidth;
      uniforms.resolution.value.y = window.innerHeight;
      renderer.setSize(window.innerWidth, window.innerHeight);
    }

    function animate() {
      requestAnimationFrame(animate);
      controls.update();
      render();
    }

    function render() {
      var elapsedMilliseconds = Date.now() - startTime;
      var elapsedSeconds = elapsedMilliseconds / 1000.;
      uniforms.time.value = .1*elapsedSeconds;
      renderer.render(scene, camera);
    }
  </script>


</body></html>
